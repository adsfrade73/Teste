<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    
    <!-- Card Principal -->
    <div class="bg-white rounded-lg shadow-xl overflow-hidden max-w-md w-full">
        <!-- Header -->
        <div class="bg-blue-600 px-6 py-4">
            <h1 class="text-white text-2xl font-bold">Título Principal</h1>
            <p class="text-blue-100 text-sm mt-1">Subtítulo descritivo</p>
        </div>
        
        <!-- Conteúdo -->
        <div class="p-6">
            <p class="text-gray-700 leading-relaxed">
                Este é um exemplo de estrutura HTML com Tailwind CSS.
                Você pode personalizar classes utilitárias para criar layouts responsivos.
            </p>
            
            <!-- Botões -->
            <div class="mt-6 flex gap-3">
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition-colors">
                    Confirmar
                </button>
                <button class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded transition-colors">
                    Cancelar
                </button>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="bg-gray-50 px-6 py-3 border-t">
            <p class="text-gray-500 text-sm text-center">© 2026 Empresa</p>
        </div>
    </div>

</body>
</html>
